<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AERO — Asistente IA de Voz</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cyan: #00f5ff; --purple: #a855f7; --green: #22c55e;
    --orange: #ff6b35; --bg: #060a0f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden; position: relative; padding: 20px;
  }
  .grid-bg {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px; animation: grid-move 4s linear infinite; z-index: 0;
  }
  .scan-line {
    position: fixed; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.5), transparent);
    animation: scan 5s linear infinite; z-index: 1;
  }
  .corner { position: fixed; width: 28px; height: 28px; z-index: 2; }
  .corner.tl { top:16px; left:16px; border-top:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.tr { top:16px; right:16px; border-top:2px solid var(--cyan); border-right:2px solid var(--cyan); }
  .corner.bl { bottom:16px; left:16px; border-bottom:2px solid var(--cyan); border-left:2px solid var(--cyan); }
  .corner.br { bottom:16px; right:16px; border-bottom:2px solid var(--cyan); border-right:2px solid var(--cyan); }
  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; gap: 28px; width: 100%; max-width: 480px;
  }
  .title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(36px, 12vw, 56px); letter-spacing: 14px; color: var(--cyan);
    text-shadow: 0 0 20px rgba(0,245,255,0.9), 0 0 50px rgba(0,245,255,0.4);
    animation: glitch 7s infinite; text-align: center;
  }
  .subtitle {
    font-family: 'Orbitron', monospace; color: rgba(0,245,255,0.4);
    font-size: 10px; letter-spacing: 8px; margin-top: 4px; text-align: center;
  }
  .orb-wrap {
    position: relative; width: 170px; height: 170px;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-border {
    position: absolute; inset: -8px; border-radius: 50%;
    background: conic-gradient(var(--cyan), transparent 60%, var(--cyan));
    animation: spin 2s linear infinite; opacity: 0.4; transition: opacity 0.3s;
  }
  .orb-border-inner { position: absolute; inset: -2px; border-radius: 50%; background: var(--bg); }
  .pulse-rings { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
  .pulse-ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--orange); opacity: 0; }
  .pulse-ring.r1 { animation: pulse 1.4s ease-out infinite; }
  .pulse-ring.r2 { animation: pulse 1.4s ease-out 0.5s infinite; }
  .pulse-ring.r3 { animation: pulse 1.4s ease-out 1s infinite; }
  .orb-btn {
    position: relative; width: 160px; height: 160px; border-radius: 50%; border: none; cursor: pointer;
    background: radial-gradient(circle at 35% 35%, #1a2a4a, #060a0f);
    box-shadow: 0 0 30px rgba(0,245,255,0.25), inset 0 0 20px rgba(0,245,255,0.08);
    transition: all 0.3s; animation: float 3.5s ease-in-out infinite;
    -webkit-tap-highlight-color: transparent; outline: none; overflow: hidden;
  }
  .orb-btn:active { transform: scale(0.96); }
  .orb-scan {
    position: absolute; inset: 0; border-radius: 50%;
    background: repeating-linear-gradient(transparent, transparent 3px, rgba(0,245,255,0.025) 3px, rgba(0,245,255,0.025) 4px);
    pointer-events: none;
  }
  .orb-icon { font-size: 52px; line-height: 1; position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; height: 100%; }
  .wave-bars { display: flex; align-items: center; justify-content: center; gap: 5px; height: 100%; position: relative; z-index: 2; }
  .wave-bar { width: 5px; height: 10px; border-radius: 3px; background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.8); }
  .wave-bar.b1 { animation: wave 0.6s ease-in-out infinite; }
  .wave-bar.b2 { animation: wave 0.6s ease-in-out 0.1s infinite; }
  .wave-bar.b3 { animation: wave 0.6s ease-in-out 0.2s infinite; }
  .wave-bar.b4 { animation: wave 0.6s ease-in-out 0.3s infinite; }
  .wave-bar.b5 { animation: wave 0.6s ease-in-out 0.4s infinite; }
  .wave-bar.b6 { animation: wave 0.6s ease-in-out 0.2s infinite; }
  .wave-bar.b7 { animation: wave 0.6s ease-in-out 0.1s infinite; }
  .status-text { font-family: 'Orbitron', monospace; font-size: 13px; letter-spacing: 3px; min-height: 22px; text-align: center; transition: color 0.3s; }
  .chat-area { width: 100%; display: flex; flex-direction: column; gap: 12px; min-height: 80px; }
  .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; animation: fadeUp 0.35s ease; display: flex; gap: 10px; align-items: flex-start; }
  .bubble.user { background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.2); border-radius: 0 14px 14px 14px; color: #a0d4e0; }
  .bubble.aero { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25); border-radius: 14px 0 14px 14px; color: #d4c0f0; }
  .bubble-label { font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; white-space: nowrap; letter-spacing: 1px; margin-top: 2px; }
  .bubble.user .bubble-label { color: var(--cyan); }
  .bubble.aero .bubble-label { color: var(--purple); }
  .error-box { background: rgba(255,50,50,0.08); border: 1px solid rgba(255,80,80,0.3); border-radius: 10px; padding: 10px 14px; color: #ff9090; font-size: 12px; animation: fadeUp 0.35s ease; }
  .hint { color: rgba(255,255,255,0.12); font-size: 11px; text-align: center; line-height: 1.9; letter-spacing: 1px; }

  @keyframes grid-move { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
  @keyframes scan { 0% { top: -2px; opacity: 1; } 90% { opacity: 1; } 100% { top: 100vh; opacity: 0; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(2.4); opacity: 0; } }
  @keyframes wave { 0%, 100% { height: 8px; } 50% { height: 34px; } }
  @keyframes glitch {
    0%,94% { text-shadow: 0 0 20px rgba(0,245,255,0.9),0 0 50px rgba(0,245,255,0.4); transform: none; }
    95% { transform: translateX(-3px); text-shadow: 3px 0 #ff006680,-3px 0 #00f5ff; }
    96% { transform: translateX(3px); text-shadow: -3px 0 #ff006680,3px 0 #00f5ff; }
    97% { transform: none; text-shadow: 0 0 20px rgba(0,245,255,0.9); }
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  body.listening .orb-btn { box-shadow: 0 0 40px rgba(255,107,53,0.6), inset 0 0 20px rgba(255,107,53,0.15); }
  body.listening .orb-border { opacity:1; background: conic-gradient(var(--orange),transparent 60%,var(--orange)); }
  body.thinking .orb-btn { box-shadow: 0 0 40px rgba(168,85,247,0.6), inset 0 0 20px rgba(168,85,247,0.15); }
  body.thinking .orb-border { opacity:1; background: conic-gradient(var(--purple),transparent 60%,var(--purple)); }
  body.speaking .orb-btn { box-shadow: 0 0 40px rgba(34,197,94,0.6), inset 0 0 20px rgba(34,197,94,0.15); }
  body.speaking .orb-border { opacity:1; background: conic-gradient(var(--green),transparent 60%,var(--green)); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="scan-line"></div>
<div class="corner tl"></div><div class="corner tr"></div>
<div class="corner bl"></div><div class="corner br"></div>

<div class="container">
  <div>
    <div class="title">AERO</div>
    <div class="subtitle">ASISTENTE IA DE VOZ</div>
  </div>
  <div class="orb-wrap">
    <div class="orb-border"></div>
    <div class="orb-border-inner"></div>
    <div class="pulse-rings" id="pulseRings" style="display:none">
      <div class="pulse-ring r1"></div>
      <div class="pulse-ring r2"></div>
      <div class="pulse-ring r3"></div>
    </div>
    <button class="orb-btn" onclick="handleOrb()">
      <div class="orb-scan"></div>
      <div id="orbIcon" class="orb-icon">🎙️</div>
      <div id="waveIcon" class="wave-bars" style="display:none">
        <div class="wave-bar b1"></div><div class="wave-bar b2"></div>
        <div class="wave-bar b3"></div><div class="wave-bar b4"></div>
        <div class="wave-bar b5"></div><div class="wave-bar b6"></div>
        <div class="wave-bar b7"></div>
      </div>
    </button>
  </div>
  <div class="status-text" id="statusText" style="color:#00f5ff;">PRESIONA PARA HABLAR</div>
  <div class="chat-area" id="chatArea"></div>
  <div class="hint" id="hint">
    PRESIONA EL ORB Y HABLA<br>AERO TE ESCUCHA Y RESPONDE<br>
    <span style="opacity:0.6">Requiere Chrome · Micrófono · Internet</span>
  </div>
</div>

<script>
const GEMINI_KEY = "AIzaSyBJiUy-KOdmi0n7ja-uwGdDK9JkSI37eyg";
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;

const SYSTEM = `Eres AERO, un asistente IA con personalidad carismática y cercana al estilo latinoamericano. Hablas como un amigo real: entusiasta, directo, con humor. Usas expresiones como chamo, chévere, dale, brutal, oye, mira. Das respuestas CORTAS (máximo 3-4 oraciones) para que suenen bien al hablarlas. Responde SIEMPRE en español conversacional y breve.`;

const PHRASES = ["CALCULANDO...","PROCESANDO...","UN SEGUNDITO...","ACTIVANDO NEURONAS...","PENSANDO..."];

let status = "idle", recognition = null, history = [], ticker = null, phraseIdx = 0;
const $ = id => document.getElementById(id);

function setStatus(s) {
  status = s;
  document.body.className = s;
  const map = {
    idle:      ["PRESIONA PARA HABLAR","#00f5ff","🎙️"],
    listening: ["ESCUCHANDO...","#ff6b35","👂"],
    thinking:  ["PENSANDO...","#a855f7","🧠"],
    speaking:  ["AERO ESTÁ HABLANDO","#22c55e","🔊"],
  };
  const [label, color, icon] = map[s];
  $("statusText").style.color = color;
  if (s !== "thinking") $("statusText").textContent = label;
  if (s === "speaking") {
    $("orbIcon").style.display = "none";
    $("waveIcon").style.display = "flex";
  } else {
    $("orbIcon").style.display = "flex";
    $("waveIcon").style.display = "none";
    $("orbIcon").textContent = icon;
  }
  $("pulseRings").style.display = s === "listening" ? "block" : "none";
  if (s !== "idle") $("hint").style.display = "none";
}

function addBubble(role, text) {
  const a = $("chatArea");
  while (a.children.length >= 4) a.removeChild(a.firstChild);
  const d = document.createElement("div");
  d.className = `bubble ${role}`;
  d.innerHTML = `<span class="bubble-label">${role==="user"?"TÚ":"AERO"}:</span><span>${text}</span>`;
  a.appendChild(d);
}

function showError(msg) {
  const d = document.createElement("div");
  d.className = "error-box";
  d.textContent = "⚠️ " + msg;
  $("chatArea").appendChild(d);
  setTimeout(() => d.remove && d.remove(), 6000);
}

function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES"; u.rate = 1.05; u.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith("es") && !v.name.includes("Google")) || voices.find(v => v.lang.startsWith("es"));
  if (v) u.voice = v;
  u.onstart = () => setStatus("speaking");
  u.onend = u.onerror = () => setStatus("idle");
  window.speechSynthesis.speak(u);
}

async function callGemini(userText) {
  setStatus("thinking");
  phraseIdx = 0;
  $("statusText").textContent = PHRASES[0];
  ticker = setInterval(() => {
    phraseIdx = (phraseIdx + 1) % PHRASES.length;
    $("statusText").textContent = PHRASES[phraseIdx];
  }, 1500);

  // Build conversation history for Gemini
  const contents = [
    { role: "user",  parts: [{ text: SYSTEM }] },
    { role: "model", parts: [{ text: "¡Entendido chamo! Soy AERO, listo para ayudarte. ¡Dale!" }] },
    ...history.slice(-6).map(m => ({
      role: m.role === "assistant" ? "model" : "user",
      parts: [{ text: m.content }]
    })),
    { role: "user", parts: [{ text: userText }] }
  ];

  try {
    const res = await fetch(GEMINI_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents,
        generationConfig: { temperature: 0.9, maxOutputTokens: 300 }
      }),
    });
    clearInterval(ticker);

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `Error ${res.status}`);
    }

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No pude procesar eso, chamo.";

    history = [...history.slice(-8),
      { role: "user", content: userText },
      { role: "assistant", content: reply }
    ];

    addBubble("aero", reply);
    speak(reply);
  } catch(err) {
    clearInterval(ticker);
    showError(err.message);
    setStatus("idle");
  }
}

function startListening() {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    showError("Usa Google Chrome para el reconocimiento de voz.");
    return;
  }
  window.speechSynthesis.cancel();
  setStatus("listening");
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "es-ES";
  recognition.interimResults = false;
  recognition.onresult = e => {
    const text = e.results[0][0].transcript;
    addBubble("user", text);
    callGemini(text);
  };
  recognition.onerror = e => {
    if (e.error !== "aborted") showError("Error micrófono: " + e.error);
    setStatus("idle");
  };
  recognition.onend = () => { if (status === "listening") setStatus("idle"); };
  recognition.start();
}

function stopAll() {
  recognition?.abort();
  window.speechSynthesis.cancel();
  clearInterval(ticker);
  setStatus("idle");
}

function handleOrb() {
  if (status === "idle") startListening(); else stopAll();
}

window.speechSynthesis.getVoices();
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
</script>
</body>
</html>
